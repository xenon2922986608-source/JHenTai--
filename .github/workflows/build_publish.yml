name: Build & Release

# Trigger manually, on push to master branch, or with a tag
on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - v*

# If previous workflow is still running, we push again, we will cancel the previous workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  Build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Android
            os: ubuntu-latest
            artifact_name: release-Android
            artifact_path: build/app/outputs/apk/release/*.apk
          - target: Windows
            os: windows-latest
            artifact_name: release-Windows
            artifact_path: build/windows/*.zip
          - target: iOS
            os: macos-latest
            cache_pod_key: ios-pods
            cache_pod_path: ios/Pods
            cache_pod_restore_keys_hash_file: ios/Podfile.lock
            artifact_name: release-iOS
            artifact_path: build/**/*.ipa
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      arch: ${{ steps.get_version.outputs.arch}}
    runs-on: ${{ matrix.os }}
    env:
      FLUTTER_VERSION: 3.24.4
    steps:
      # Checkout branch
      - name: Checkout
        uses: actions/checkout@v3
      # Add Android keystore
      - name: Setup Android keystore
        if: matrix.target == 'Android'
        shell: bash
        env:
          ENCODED_KEYSTORE: ${{ secrets.ENCODED_KEYSTORE }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          set -e
          mkdir -p android/app

          if [ -n "$ENCODED_KEYSTORE" ] && [ -n "$KEY_PROPERTIES" ]; then
            echo "$ENCODED_KEYSTORE" | base64 -di > android/app/upload-keystore.jks
            printf '%s\n' "$KEY_PROPERTIES" > android/key.properties
            echo "Using repository Android signing config"
          else
            echo "Using temporary CI Android signing config"

            keytool -genkeypair \
              -v \
              -keystore android/app/ci-upload-keystore.jks \
              -storepass android \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias ci \
              -dname "CN=CI,O=Fork,C=US"

            cat > android/key.properties <<'EOF'
          storePassword=android
          keyPassword=android
          keyAlias=ci
          storeFile=ci-upload-keystore.jks
          EOF
          fi
      # Add JHenTai api serret
      - name: Setup JHenTai API Secret
        shell: bash
        env:
          JH_API_SECRET_CONFIG: ${{ secrets.JH_API_SECRET_CONFIG }}
        run: |
          mkdir -p lib/src/config

          if [ -n "$JH_API_SECRET_CONFIG" ]; then
            printf '%s\n' "$JH_API_SECRET_CONFIG" > lib/src/config/jh_api_secret_config.dart
            echo "Using repository secret JHApiSecretConfig"
          else
            echo "Using fallback JHApiSecretConfig"
            cat > lib/src/config/jh_api_secret_config.dart <<'EOF'
          class JHApiSecretConfig {
            static const String secret = '';
          }
          EOF
          fi

          if ! grep -q "JHApiSecretConfig" lib/src/config/jh_api_secret_config.dart; then
            echo "Generated secret config is invalid; replacing with fallback JHApiSecretConfig"
            cat > lib/src/config/jh_api_secret_config.dart <<'EOF'
          class JHApiSecretConfig {
            static const String secret = '';
          }
          EOF
          fi
      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'master'
          cache: true
      # Output Flutter Version
      - name: Output Flutter Version
        run: flutter --version
      # Cache Pod
      - name: Cache Pod
        if: matrix.cache_pod_key != null
        uses: actions/cache@v3
        with:
          key: ${{ matrix.cache_pod_key }}
          path: ${{ matrix.cache_pod_path }}
          restore-keys: ${{ matrix.cache_key }}-${{ hashFiles(matrix.cache_pod_restore_keys_hash_file)}}
      # Setup JDK
      - name: Setup JDK 17 (Android)
        if: matrix.target == 'Android'
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle
      # Xcodebuild
      - name: Build Xcode
        if: matrix.os == 'macos-latest'
        run: xcodebuild -resolvePackageDependencies -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release
      # Flutter Pub Get
      - name: Flutter Pub Get
        run: |
          git config --global core.longpaths true
          flutter pub get
      # Get app version
      - name: Get app version
        id: get_version
        shell: bash
        run: |
          echo "version=$(head -n 5 pubspec.yaml | tail -n 1 | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT
          echo "arch=$(echo $RUNNER_ARCH | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      # Build Android .apk
      - name: Build Android
        if: matrix.target == 'Android'
        run: |
          flutter build apk -t lib/src/main.dart --release --split-per-abi
          cd build/app/outputs/apk/release
          mv app-arm64-v8a-release.apk JHenTai-${{ steps.get_version.outputs.version }}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk JHenTai-${{ steps.get_version.outputs.version }}-armeabi-v7a.apk
          mv app-x86_64-release.apk JHenTai-${{ steps.get_version.outputs.version }}-x64.apk
      # Build iOS .ipa
      - name: Build iOS
        if: matrix.target == 'ios'
        run: |
          flutter precache --ios
          cd ios
          pod update
          cd ..
          flutter build ios -t lib/src/main.dart --release --no-codesign
          sh thin-payload.sh build/ios/iphoneos/*.app
          cd build
          mkdir -p Payload
          mv ios/iphoneos/*.app Payload
          zip -9 JHenTai_${{ steps.get_version.outputs.version }}.ipa -r Payload
      # Build Windows .zip
      - name: Build Windows
        if: matrix.target == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          flutter build windows -t lib/src/main.dart --release
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $DestDir = "build\windows\JHenTai_${{ steps.get_version.outputs.version }}"
          $SrcDir = "build\windows\x64\runner\Release"

          if (!(Test-Path $SrcDir)) {
            throw "Expected Windows release directory not found: $SrcDir"
          }

          New-Item -Path $DestDir -ItemType Directory -Force
          Copy-Item -Path "$SrcDir\*" -Destination $DestDir -Recurse -Force

          if (Test-Path "windows\*.dll") {
            Copy-Item -Path "windows\*.dll" -Destination $DestDir -Force
          }

          Compress-Archive -Path $DestDir -DestinationPath "build\windows\JHenTai_${{ steps.get_version.outputs.version }}_Windows.zip" -Force
      # Upload Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
  Publish:
    if: startsWith(github.ref, 'refs/tags/')
    name: Publish
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Make tmp dir
        run: mkdir /tmp/artifacts
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
      - name: List all Artifacts
        run: ls -R /tmp/artifacts
      # Upload release assets
      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          allowUpdates: true
          bodyFile: changelog/${{ github.ref_name }}.md
          artifacts: /tmp/artifacts/release-Android/*.apk,/tmp/artifacts/release-iOS/*.ipa,/tmp/artifacts/release-Windows/*.zip
          artifactErrorsFailBuild: true
          replacesArtifacts: true

      # Get IPA file size
      - name: Get IPA file size
        id: get_ipa_size
        run: |
          IPA_SIZE=$(stat -c %s /tmp/artifacts/release-iOS/*.ipa)
          echo "ipa_size=$IPA_SIZE" >> $GITHUB_OUTPUT

      # Get changelog content
      - name: Get changelog content
        id: get_changelog
        run: |
          # Read changelog and preserve newlines for JSON
          CHANGELOG=$(cat changelog/${{ github.ref_name }}.md | jq -Rs .)
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      # Extract build version from tag
      - name: Get build version
        id: get_build_version
        run: |
          BUILD_VERSION=$(echo "${{ github.ref_name }}" | grep -oE '\+[0-9]+' | tr -d '+')
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT

      # Update AltSource.json
      - name: Update AltSource.json
        run: |
          FULL_VERSION="${{ needs.Build.outputs.version }}"
          # Remove build number part (content after +)
          VERSION="${FULL_VERSION%%+*}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Get changelog as raw string (remove quotes added by jq -Rs)
          CHANGELOG=${{ steps.get_changelog.outputs.changelog }}
          
          # Create new version entry
          jq --arg version "$VERSION" \
             --arg build "${{ steps.get_build_version.outputs.build_version }}" \
             --arg date "$DATE" \
             --arg desc "$CHANGELOG" \
             --arg url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JHenTai_${FULL_VERSION}.ipa" \
             --arg size "${{ steps.get_ipa_size.outputs.ipa_size }}" \
             '.apps[0].versions[0] = {
                "version": $version,
                "buildVersion": $build,
                "date": $date,
                "localizedDescription": $desc,
                "downloadURL": $url,
                "size": ($size | tonumber)
              }' altsource/AltSource.json > altsource/AltSource.json.tmp
          mv altsource/AltSource.json.tmp altsource/AltSource.json

      # Commit and push updated AltSource.json
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add altsource/AltSource.json
          git commit -m "Update AltSource.json for version ${{ needs.Build.outputs.version }}"
          git push origin HEAD:master

