name: Build & Release

# Trigger manually, on push to master branch, or with a tag
on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - v*

# If previous workflow is still running, we push again, we will cancel the previous workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  Build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Android
            os: ubuntu-latest
            artifact_name: release-Android
            artifact_path: build/app/outputs/apk/release/*.apk
          - target: Windows
            os: windows-latest
            artifact_name: release-Windows
            artifact_path: build/windows/*.zip
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      arch: ${{ steps.get_version.outputs.arch}}
    runs-on: ${{ matrix.os }}
    env:
      FLUTTER_VERSION: 3.24.4
    steps:
      # Checkout branch
      - name: Checkout
        uses: actions/checkout@v3
      # Setup JDK
      - name: Setup JDK 17 (Android)
        if: matrix.target == 'Android'
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle
      # Add Android keystore
      - name: Setup Android keystore
        if: matrix.target == 'Android'
        shell: bash
        env:
          ENCODED_KEYSTORE: ${{ secrets.ENCODED_KEYSTORE }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          set -euo pipefail
          mkdir -p android/app

          if [ -n "${ENCODED_KEYSTORE:-}" ] && [ -n "${KEY_PROPERTIES:-}" ]; then
            printf '%s' "$ENCODED_KEYSTORE" | base64 --decode > android/app/upload-keystore.jks
            printf '%s\n' "$KEY_PROPERTIES" | tr -d '\r' > android/key.properties
            echo "Using repository Android signing config"
            echo "ANDROID_SIGNING_CONFIG_SOURCE=repository" >> "$GITHUB_ENV"
          else
            echo "Using temporary CI Android signing config"
            echo "ANDROID_SIGNING_CONFIG_SOURCE=temporary" >> "$GITHUB_ENV"

            keytool -genkeypair \
              -v \
              -keystore android/app/ci-upload-keystore.jks \
              -storepass android \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias ci \
              -dname "CN=CI,O=Fork,C=US"

            printf '%s\n' \
              'storePassword=android' \
              'keyPassword=android' \
              'keyAlias=ci' \
              'storeFile=ci-upload-keystore.jks' > android/key.properties
          fi
      # Diagnose Android signing identity without printing secrets
      - name: Diagnose Android signing identity
        if: matrix.target == 'Android'
        shell: bash
        run: |
          set -euo pipefail

          key_properties_file="android/key.properties"
          if [ ! -f "$key_properties_file" ]; then
            echo "android/key.properties was not generated" >&2
            exit 1
          fi

          get_property() {
            awk -F= -v key="$1" '
              {
                property_name = $1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", property_name)
                if (property_name == key) {
                  sub(/^[^=]*=/, "")
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "")
                  print
                  exit
                }
              }
            ' "$key_properties_file"
          }

          store_file="$(get_property storeFile)"
          key_alias="$(get_property keyAlias)"
          store_password="$(get_property storePassword)"

          if [ -z "$store_file" ] || [ -z "$key_alias" ] || [ -z "$store_password" ]; then
            echo "Android signing config is missing storeFile, keyAlias, or storePassword" >&2
            exit 1
          fi

          if [ "${ANDROID_SIGNING_CONFIG_SOURCE:-unknown}" = "repository" ] && [ "$store_file" != "upload-keystore.jks" ]; then
            echo "Repository KEY_PROPERTIES must use storeFile=upload-keystore.jks so android/app/build.gradle resolves android/app/upload-keystore.jks" >&2
            exit 1
          fi

          if [[ "$store_file" = /* ]]; then
            resolved_store_file="$store_file"
          else
            resolved_store_file="android/app/$store_file"
          fi

          if [ ! -f "$resolved_store_file" ]; then
            echo "Android keystore file does not exist at resolved path: $resolved_store_file" >&2
            exit 1
          fi

          echo "Android signing config source: ${ANDROID_SIGNING_CONFIG_SOURCE:-unknown}"
          echo "Android signing storeFile: $store_file"
          echo "Android signing keyAlias: $key_alias"

          keytool -list -v -keystore "$resolved_store_file" -alias "$key_alias" -storepass "$store_password" \
            | awk '/Alias name:/{ print "Android signing " $0 } /SHA256:/{ print "Android signing certificate " $0; found=1; exit } END { if (!found) exit 1 }'
      # Add JHenTai api serret
      - name: Setup JHenTai API Secret
        shell: bash
        env:
          JH_API_SECRET_CONFIG: ${{ secrets.JH_API_SECRET_CONFIG }}
        run: |
          mkdir -p lib/src/config

          if [ -n "$JH_API_SECRET_CONFIG" ]; then
            printf '%s\n' "$JH_API_SECRET_CONFIG" > lib/src/config/jh_api_secret_config.dart
            echo "Using repository secret JHApiSecretConfig"
          else
            echo "Using fallback JHApiSecretConfig"
            cat > lib/src/config/jh_api_secret_config.dart <<'EOF'
          class JHApiSecretConfig {
            static const String secret = '';
          }
          EOF
          fi

          if ! grep -q "JHApiSecretConfig" lib/src/config/jh_api_secret_config.dart; then
            echo "Generated secret config is invalid; replacing with fallback JHApiSecretConfig"
            cat > lib/src/config/jh_api_secret_config.dart <<'EOF'
          class JHApiSecretConfig {
            static const String secret = '';
          }
          EOF
          fi
      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'master'
          cache: true
      # Output Flutter Version
      - name: Output Flutter Version
        run: flutter --version
      # Flutter Pub Get
      - name: Flutter Pub Get
        run: |
          git config --global core.longpaths true
          flutter pub get
      # Get app version
      - name: Get app version
        id: get_version
        shell: bash
        run: |
          echo "version=$(head -n 5 pubspec.yaml | tail -n 1 | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT
          echo "arch=$(echo $RUNNER_ARCH | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      # Build Android .apk
      - name: Build Android
        if: matrix.target == 'Android'
        run: |
          flutter build apk -t lib/src/main.dart --release --split-per-abi
          cd build/app/outputs/apk/release
          mv app-arm64-v8a-release.apk JHenTai-${{ steps.get_version.outputs.version }}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk JHenTai-${{ steps.get_version.outputs.version }}-armeabi-v7a.apk
          mv app-x86_64-release.apk JHenTai-${{ steps.get_version.outputs.version }}-x64.apk
      # Build Windows .zip
      - name: Build Windows
        if: matrix.target == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          flutter build windows -t lib/src/main.dart --release
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $DestDir = "build\windows\JHenTai_${{ steps.get_version.outputs.version }}"
          $SrcDir = "build\windows\x64\runner\Release"

          if (!(Test-Path $SrcDir)) {
            throw "Expected Windows release directory not found: $SrcDir"
          }

          New-Item -Path $DestDir -ItemType Directory -Force
          Copy-Item -Path "$SrcDir\*" -Destination $DestDir -Recurse -Force

          if (Test-Path "windows\*.dll") {
            Copy-Item -Path "windows\*.dll" -Destination $DestDir -Force
          }

          Compress-Archive -Path $DestDir -DestinationPath "build\windows\JHenTai_${{ steps.get_version.outputs.version }}_Windows.zip" -Force
      # Upload Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
  Publish:
    if: startsWith(github.ref, 'refs/tags/')
    name: Publish
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Make tmp dir
        run: mkdir /tmp/artifacts
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
      - name: List all Artifacts
        run: ls -R /tmp/artifacts
      # Upload release assets
      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          allowUpdates: true
          bodyFile: changelog/${{ github.ref_name }}.md
          artifacts: /tmp/artifacts/release-Android/*.apk,/tmp/artifacts/release-Windows/*.zip
          artifactErrorsFailBuild: true
          replacesArtifacts: true
